<!DOCTYPE html>
<html>
<head>
  <title>Snake Console Edition</title>
  <style>
    body { 
      background-color: #050511; 
      color: #fff; 
      display: flex; 
      flex-direction: column;
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      overflow: hidden; 
      font-family: sans-serif; 
    }
    canvas { 
      background-color: #111; 
      border: 4px solid #1ed760; 
      border-radius: 10px; 
      box-shadow: 0 0 30px rgba(30, 215, 96, 0.4); 
    }
    #scoreBoard {
      display: flex;
      justify-content: space-between;
      width: 600px;
      margin-bottom: 20px;
    }
    #score { 
      font-size: 24px; 
      font-weight: bold; 
      color: #1ed760; 
      letter-spacing: 2px;
    }
    #gameover { 
      position: absolute; 
      font-size: 50px; 
      font-weight: 900; 
      color: #ff3366; 
      display: none; 
      text-shadow: 0 0 30px #ff3366; 
      text-align: center;
      background: rgba(0,0,0,0.8);
      padding: 40px;
      border-radius: 20px;
      border: 2px solid #ff3366;
    }
  </style>
</head>
<body>
  
  <div id="scoreBoard">
    <div id="score">SCORE: 0</div>
    <div style="color: gray; font-weight: bold;">USE D-PAD TO MOVE</div>
  </div>

  <div id="gameover">
    GAME OVER<br>
    <span style="font-size: 20px; color:white; font-weight: normal;">Press <b>SELECT (✕)</b> on your phone to Restart</span>
  </div>

  <canvas id="gameCanvas" width="600" height="600"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gridSize = 25;
    let snake = [{ x: 300, y: 300 }];
    let food = { x: 100, y: 100 };
    let dx = gridSize, dy = 0;
    let score = 0;
    let isGameOver = false;

    function randomFood() {
      food.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
      food.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
    }

    function draw() {
      if (isGameOver) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw Food (Red Apple)
      ctx.fillStyle = '#ff3366';
      ctx.beginPath();
      ctx.arc(food.x + gridSize/2, food.y + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Move Snake
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };
      snake.unshift(head);

      // Check if food eaten
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById('score').innerText = 'SCORE: ' + score;
        randomFood();
      } else {
        snake.pop();
      }

      // Check Collision (Wall or Self)
      if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) gameOver();
      for (let i = 1; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) gameOver();
      }

      // Draw Snake
      snake.forEach((part, index) => {
        ctx.fillStyle = index === 0 ? '#ffffff' : '#1ed760'; // Head is white, body is green
        ctx.fillRect(part.x, part.y, gridSize - 2, gridSize - 2);
      });
    }

    function gameOver() {
      isGameOver = true;
      document.getElementById('gameover').style.display = 'block';
    }

    function restart() {
      snake = [{ x: 300, y: 300 }];
      dx = gridSize; dy = 0; score = 0;
      isGameOver = false;
      document.getElementById('score').innerText = 'SCORE: 0';
      document.getElementById('gameover').style.display = 'none';
      randomFood();
    }

    randomFood();
    setInterval(draw, 100);

    // 🔥 MAGIC: Listening to your GameAdda Controller via postMessage
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'CONTROLLER_COMMAND') {
        const cmd = event.data.command;
        
        // Restart logic
        if (isGameOver && cmd === 'SELECT') { restart(); return; }
        
        // Movement logic
        if (cmd === 'UP' && dy === 0) { dx = 0; dy = -gridSize; }
        if (cmd === 'DOWN' && dy === 0) { dx = 0; dy = gridSize; }
        if (cmd === 'LEFT' && dx === 0) { dx = -gridSize; dy = 0; }
        if (cmd === 'RIGHT' && dx === 0) { dx = gridSize; dy = 0; }
      }
    });
  </script>
</body>
</html>
